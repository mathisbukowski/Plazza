name: Plazza CI/CD

env:
  MIRROR_URL: "git@github.com:EpitechPromo2028/B-CCP-400-LIL-4-1-theplazza-mathis.bukowski.git"
  MIRROR_NAME: "EpitechPromo2028/B-CCP-400-LIL-4-1-theplazza-mathis.bukowski.git"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'

jobs:
  check_program_compilation:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:devel
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Create Build Directory"
        run: mkdir -p build

      - name: "Compile the Program with CMake and Make"
        run: |
          cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build .
        timeout-minutes: 2

      - name: "Verify Executable Permissions and Presence"
        run: |
          if [ -f "plazza" ] && [ -x "plazza" ]; then
              echo "plazza exists and is executable."
          else
              echo "plazza does not exist or is not executable."
              exit 1
          fi

  push_to_mirror:
    needs: check_program_compilation
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Push to Mirror Repository"
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}